services:
  postgres:
    image: postgres:18.4-alpine
    container_name: tasks-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - tasks_postgres_data:/var/lib/postgresql
    networks:
      - tasks-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasks_user -d tasks_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s


  backend:
    image: amazoncorretto:25-alpine
    container_name: tasks-backend
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:${POSTGRES_PORT}/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    working_dir: /app
    volumes:
      - ./tasks-backend/target/tasks-backend-1.0.2.jar:/app/app.jar:ro
    networks:
      - tasks-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/task-lists"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    depends_on:
      postgres:
        condition: service_healthy
    command: java -jar /app/app.jar

  frontend:
    image: nginx:alpine
    container_name: tasks-frontend
    restart: unless-stopped
    volumes:
      - ./tasks-frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - tasks-network
    ports:
      - "8081:80"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/index.html"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    depends_on:
      backend:
        condition: service_healthy

volumes:
  tasks_postgres_data:
networks:
  tasks-network:
    driver: bridge